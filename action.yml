name: CodeGraph Impact
description: Generate a git-diff impact summary for AI coding agents and pull requests.
author: geyuejun

inputs:
  base:
    description: Git ref to compare against.
    required: false
    default: HEAD
  agent:
    description: Agent context style: codex, claude, cursor, or generic.
    required: false
    default: codex
  report:
    description: Write a HTML report artifact in .codegraph-impact/report.html.
    required: false
    default: "false"
  pr-comment:
    description: Print a GitHub PR Markdown comment to stdout.
    required: false
    default: "true"
  out-dir:
    description: Artifact output directory.
    required: false
    default: .codegraph-impact

outputs:
  comment:
    description: Markdown PR comment generated by codegraph-impact.
    value: ${{ steps.impact.outputs.comment }}
  comment-path:
    description: Path to the generated Markdown PR comment file.
    value: ${{ steps.impact.outputs.comment-path }}
  json-path:
    description: Path to the generated JSON impact report.
    value: ${{ steps.impact.outputs.json-path }}
  context-path:
    description: Path to the generated agent context pack.
    value: ${{ steps.impact.outputs.context-path }}
  report-path:
    description: Path to the generated HTML report when report=true.
    value: ${{ steps.impact.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
    - name: Install dependencies
      shell: bash
      run: npm ci
      working-directory: ${{ github.action_path }}
    - name: Build CodeGraph Impact
      shell: bash
      run: npm run build
      working-directory: ${{ github.action_path }}
    - name: Generate impact report
      id: impact
      shell: bash
      run: |
        mkdir -p "${{ inputs.out-dir }}"
        args=(
          "--base" "${{ inputs.base }}"
          "--agent" "${{ inputs.agent }}"
          "--out-dir" "${{ inputs.out-dir }}"
        )
        if [ "${{ inputs.report }}" = "true" ]; then
          args+=("--report")
        fi
        if [ "${{ inputs.pr-comment }}" = "true" ]; then
          args+=("--pr-comment")
        fi
        if [ "${{ inputs.pr-comment }}" = "true" ]; then
          node "${{ github.action_path }}/dist/cli.js" "${args[@]}" > "${{ inputs.out-dir }}/pr-comment.md"
          cat "${{ inputs.out-dir }}/pr-comment.md"
          {
            echo "comment<<CODEGRAPH_IMPACT_EOF"
            cat "${{ inputs.out-dir }}/pr-comment.md"
            echo "CODEGRAPH_IMPACT_EOF"
          } >> "$GITHUB_OUTPUT"
        else
          node "${{ github.action_path }}/dist/cli.js" "${args[@]}"
        fi
        {
          echo "comment-path=${{ inputs.out-dir }}/pr-comment.md"
          echo "json-path=${{ inputs.out-dir }}/impact.json"
          echo "context-path=${{ inputs.out-dir }}/agent-context.md"
          echo "report-path=${{ inputs.out-dir }}/report.html"
        } >> "$GITHUB_OUTPUT"
